<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>手順書</title>
  </head>
  <body>
    <h1>手順書</h1>
    <h2>設計</h2>
    <h3>目的の確認</h3>
    <ol>
      <li>依頼者にターゲットとゴールをヒアリングする</li>
    </ol>
    <h3>構成案の作成</h3>
    <ol>
      <li>目次と各章の要点を箇条書きにする</li>
      <li>上長のレビューを受ける</li>
    </ol>
    <h3>リソース収集</h3>
    <ol>
      <li>必要な数値データ、過去の参照資料を集める</li>
    </ol>
    <h2>実作業</h2>
    <h3>データ加工</h3>
    <ol>
      <li>収集したデータを入力する</li>
      <li>グラフなど適宜配置する</li>
    </ol>
  </body>
</html>
